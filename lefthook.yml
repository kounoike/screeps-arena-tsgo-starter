# Lefthook configuration
# https://lefthook.dev/configuration/

pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{js,ts,jsx,tsx,json,jsonc}"
      run: pnpm biome check --write --unsafe --no-errors-on-unmatched --files-ignore-unknown=true --staged {staged_files}
      stage_fixed: true

pre-push:
  commands:
    typecheck:
      run: pnpm run typecheck
    lint:
      run: pnpm lint

